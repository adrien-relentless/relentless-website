backend:
  name: git-gateway
  branch: main

media_folder: "data/pics/blog"
public_folder: "/data/pics/blog"

locale: fr

collections:
  - name: "posts"
    label: "Articles"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication (AAAA-MM-JJ)", name: "date", widget: "string", hint: "Format : 2025-04-29", pattern: ["^[0-9]{4}-[0-9]{2}-[0-9]{2}$", "Format requis : AAAA-MM-JJ (ex: 2025-04-29)"] }
      - { label: "Auteur", name: "author", widget: "string", required: false }
      - { label: "Résumé (extrait)", name: "excerpt", widget: "text", required: false, hint: "Court résumé affiché sur la liste des articles (2-3 phrases)." }
      - label: "Guide Markdown"
        name: "markdown_guide"
        widget: "text"
        required: false
        hint: |
          ── MISE EN FORME ──
          **texte** → gras
          *texte* → italique

          ── TITRES ──
          ## Titre de section (grand)
          ### Sous-titre (rouge, majuscules)

          ── LISTES ──
          - élément 1
          - élément 2

          ── CITATION / ENCADRÉ ──
          > Votre citation ou point important ici

          ── SÉPARATEUR ──
          --- (ligne horizontale)

          ── LIEN ──
          [texte du lien](https://url.com)

          NE PAS modifier ce champ — il est uniquement informatif.
      - { label: "Contenu", name: "body", widget: "markdown" }
