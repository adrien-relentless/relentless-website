[build]
  command = "npm install && npm run build"
  publish = "_site"

[[redirects]]
  from = "/api/yt-rss"
  to = "https://www.youtube.com/feeds/videos.xml?channel_id=UCLaFexmmlPB3qv7SgXYq5Hg"
  status = 200
  force = true

[[redirects]]
  from = "/api/podcast-rss"
  to = "https://feeds.acast.com/public/shows/6342cfdba66fae0012df9ff8"
  status = 200
  force = true

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
